name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # Usamos una acción de la comunidad compatible con Claude/Anthropic
      - name: Claude PR Review
        uses: mshick/ai-pr-review-action@v2
        with:
          image: "anthropic/claude-3-5-sonnet" # O el modelo más reciente que prefieras
          api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
